# Production Environment Configuration
environment: production
debug: false
log_level: INFO

database:
  url: ${DATABASE_URL}
  echo: false
  pool_size: 20
  max_overflow: 40
  ssl_mode: require

api:
  host: 0.0.0.0
  port: 8000
  reload: false
  cors_origins:
    - https://example.com
  rate_limit: 1000

cache:
  backend: redis
  url: ${REDIS_URL}
  ttl: 3600

observability:
  metrics_enabled: true
  tracing_enabled: true
  json_logging: true
  log_file: /var/log/meridian/app.log

security:
  secret_key: ${SECRET_KEY}
  algorithm: HS256
  access_token_expire_minutes: 60
