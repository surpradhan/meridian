<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Globe outline -->
  <circle cx="32" cy="32" r="28" stroke="#0d9488" stroke-width="2" fill="#0B1120"/>
  <!-- Meridian arc -->
  <ellipse cx="32" cy="32" rx="12" ry="28" stroke="#0d9488" stroke-width="2.5" fill="none"/>
  <!-- Equator -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="#0d9488" stroke-width="1.5" fill="none" opacity="0.35"/>
  <!-- Gold center -->
  <circle cx="32" cy="32" r="4" fill="#f59e0b"/>
  <!-- North tick -->
  <line x1="32" y1="2" x2="32" y2="7" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
