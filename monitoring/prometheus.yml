global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []   # wire Alertmanager here when adding notification channels

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: meridian
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
