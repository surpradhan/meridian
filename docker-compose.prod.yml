version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - METRICS_ENABLED=true
      - JAEGER_ENABLED=true
      - OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - meridian_network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meridian_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meridian_network

  # ── Observability stack ────────────────────────────────────────────────────
  # /metrics is intentionally unauthenticated — restrict to internal network
  # via firewall rules, VPC security groups, or an nginx allow/deny block.

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI — bind to localhost only in prod
      - "4317:4317"               # OTLP gRPC (internal)
      - "4318:4318"               # OTLP HTTP (internal)
    restart: unless-stopped
    networks:
      - meridian_network

  prometheus:
    image: prom/prometheus:v2.48.1
    ports:
      - "127.0.0.1:9090:9090"   # Prometheus UI — localhost only in prod
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - meridian_network

  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI — localhost only; reverse-proxy for external access
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - meridian_network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  meridian_network:
    driver: bridge
